<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Squad 2026 - Five Day Course</title>
<style>
  :root{
    --bg:#ffffff; --ink:#16223a; --muted:#5b6b85; --line:#e2e8f0; --soft:#f4f7fb; --soft2:#eef3fb;
    --d1:#2563eb; --d2:#d97706; --d3:#7c3aed; --d4:#0891b2; --d5:#e11d48; --ai:#059669; --slate:#334155;
    --good:#16a34a; --bad:#dc2626; --warn:#d97706;
    --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
    --sans:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --accent:#2563eb;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:#5566;font-family:var(--sans);color:var(--ink)}
  #deck{height:100vh;width:100vw;overflow:hidden;position:relative;background:var(--bg)}
  .slide{position:absolute;inset:0;display:none;background:var(--bg);overflow:hidden}
  .slide.active{display:block}
  .inner{padding:40px 56px 58px;min-height:100%;transform-origin:top left}
  .inner.center{display:flex;flex-direction:column;justify-content:center;align-items:flex-start;min-height:calc(100vh - 0px)}
  /* header */
  .kick{font-family:var(--mono);font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;margin:0 0 4px;display:flex;gap:10px;align-items:center}
  .kick .clock{background:var(--accent);color:#fff;border-radius:5px;padding:2px 9px;font-size:11.5px;letter-spacing:.05em}
  h1{font-size:46px;line-height:1.05;margin:0 0 10px;font-weight:800;letter-spacing:-.4px}
  h2{font-size:31px;line-height:1.12;margin:0 0 12px;font-weight:780;letter-spacing:-.3px}
  h3{font-size:18px;margin:12px 0 6px;color:var(--accent);font-weight:750}
  p,li{font-size:17px;line-height:1.46}
  .lead{font-size:21px;color:var(--muted);max-width:64ch;line-height:1.4}
  .muted{color:var(--muted)} .small{font-size:14px} .tiny{font-size:12.5px}
  ul{margin:6px 0 6px 2px;padding-left:20px} li{margin:5px 0}
  b,strong{color:#0b1424}
  .grid{display:grid;gap:14px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g2a{grid-template-columns:1.3fr 1fr}.g2b{grid-template-columns:1fr 1.25fr}
  .card{background:var(--soft);border:1px solid var(--line);border-radius:13px;padding:14px 16px}
  .card.tint{background:var(--soft2)}
  .bar-accent{border-top:3px solid var(--accent)}
  .pill{display:inline-block;font-family:var(--mono);font-size:12px;padding:3px 10px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:#fff;margin:2px}
  .pill.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  table{border-collapse:collapse;width:100%;font-size:15px;margin:6px 0}
  th,td{border:1px solid var(--line);padding:8px 11px;text-align:left;vertical-align:top}
  th{background:var(--accent);color:#fff;font-family:var(--mono);font-size:12.5px;letter-spacing:.04em;text-transform:uppercase;font-weight:700}
  tr:nth-child(even) td{background:var(--soft)}
  code{font-family:var(--mono);background:#eaf0f8;border:1px solid var(--line);border-radius:5px;padding:0 5px;font-size:.9em;color:#9333ea}
  pre{font-family:var(--mono);background:#0f172a;color:#e6edf7;border-radius:11px;padding:13px 15px;overflow:hidden;font-size:14px;line-height:1.5;margin:6px 0}
  pre .c{color:#7d8db3}.k{color:#ff9bce}.s{color:#ffd479}.f{color:#7ee0ff}.n{color:#c4b5fd}.o{color:#9be7b4}
  .def{border:1px solid var(--line);border-left:5px solid var(--accent);background:var(--soft);border-radius:10px;padding:11px 15px;margin:6px 0}
  .def .term{font-weight:800;font-size:18px;color:#0b1424}
  .def .full{font-family:var(--mono);font-size:12.5px;color:var(--accent);letter-spacing:.03em}
  .why{border-left:5px solid var(--good);background:#f0fdf4;border-radius:10px;padding:10px 15px;margin:6px 0;font-size:15.5px}
  .why b{color:#15803d}
  .news{border-left:5px solid var(--bad);background:#fef2f2;border-radius:10px;padding:10px 15px;margin:6px 0;font-size:15px}
  .news b{color:#b91c1c}
  .note{border-left:5px solid var(--warn);background:#fffbeb;border-radius:10px;padding:10px 15px;margin:6px 0;font-size:15px}
  .lab{border:1.5px dashed var(--accent);background:#f8fbff;border-radius:12px;padding:12px 16px;margin:4px 0}
  .lab h3{margin-top:0}
  .plat{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12.5px;font-weight:700;border-radius:7px;padding:4px 10px;margin:3px 6px 3px 0;border:1px solid var(--line)}
  .plat.colab{background:#fff7ed;color:#b45309;border-color:#fed7aa}
  .plat.range{background:#ecfeff;color:#0e7490;border-color:#a5f3fc}
  .plat.kali{background:#0f172a;color:#7ee0ff;border-color:#0f172a}
  .plat.web{background:#eef2ff;color:#4338ca;border-color:#c7d2fe}
  .kc{border:1.5px solid var(--d3);background:#faf5ff;border-radius:12px;padding:12px 16px;margin:6px 0}
  .kc h3{color:var(--d3);margin:0 0 4px}
  .kc .q{font-weight:700;font-size:16.5px}
  .kc button{font-family:var(--mono);font-size:12.5px;background:var(--d3);color:#fff;border:0;border-radius:7px;padding:6px 13px;cursor:pointer;font-weight:700;margin-top:8px}
  .kc .ans{display:none;margin-top:8px;border-top:1px solid #e9d5ff;padding-top:8px;font-size:15px}
  .kc.show .ans{display:block}
  .stat{font-family:var(--mono);font-weight:800;line-height:1;color:var(--accent)}
  .flex{display:flex;gap:18px;align-items:center}.col{flex:1}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0}
  .tl{position:relative;margin:8px 0 0 6px;padding-left:22px;border-left:3px solid var(--line)}
  .tl .ev{position:relative;margin:0 0 12px}
  .tl .ev:before{content:"";position:absolute;left:-29px;top:3px;width:12px;height:12px;border-radius:50%;background:var(--accent)}
  .tl .ev .t{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:700}
  /* chrome */
  .pbar{position:fixed;top:0;left:0;height:4px;background:var(--accent);z-index:60;transition:width .2s}
  .foot{position:absolute;left:0;right:0;bottom:0;height:38px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-top:1px solid var(--line);font-family:var(--mono);font-size:11px;color:var(--muted);background:#fff}
  .foot .sec{color:var(--accent);font-weight:700}
  .ctrl{position:fixed;right:14px;bottom:46px;display:flex;gap:7px;z-index:40}
  .ctrl button,.menub{font-family:var(--mono);font-size:12px;background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:7px 11px;cursor:pointer;box-shadow:0 2px 8px rgba(20,40,80,.08)}
  .ctrl button:hover,.menub:hover{border-color:var(--accent);color:var(--accent)}
  .menub{position:fixed;left:14px;top:10px;z-index:60}
  #toc{position:fixed;inset:0;background:rgba(255,255,255,.98);z-index:70;display:none;padding:50px 6vw;overflow:auto}
  #toc.open{display:block}#toc h2{margin-top:0}
  #toc .close{position:fixed;right:20px;top:14px}
  #toc .grp{font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
  #toc a{display:inline-block;width:48%;color:var(--ink);text-decoration:none;padding:7px 11px;border:1px solid var(--line);border-radius:8px;margin:3px .5%;font-size:14px}
  #toc a:hover{border-color:var(--accent);color:var(--accent);background:var(--soft)}
  .badge{display:inline-flex;align-items:center;gap:8px;border:1.5px solid var(--accent);color:var(--accent);border-radius:999px;padding:6px 16px;font-family:var(--mono);font-size:12.5px;font-weight:700}
  svg{max-width:100%}
  @media print{.slide{display:block!important;position:relative;height:auto;page-break-after:always}.inner{transform:none!important;zoom:1!important}.ctrl,.menub,.pbar{display:none}}

/* --- responsive + accessible (added) --- */
.slide{overflow-y:auto;-webkit-overflow-scrolling:touch}
.inner{padding-bottom:88px}
.menub,.ctrl button{min-height:44px}
.ctrl button{font-size:14px;padding:10px 14px;border-radius:8px;background:#fff;border:1px solid var(--line);color:var(--ink);cursor:pointer}
@media (max-width:860px){
 .inner{padding:16px 14px 96px}
 h1{font-size:27px;line-height:1.15} h2{font-size:20px} h3{font-size:16px}
 p,li{font-size:16px;line-height:1.5} .lead{font-size:18px}
 .grid{gap:10px} .g2,.g3,.g2a,.g2b{grid-template-columns:1fr!important}
 table{font-size:12.5px} .kick{font-size:11px}
 .menub{top:8px;left:8px} #dayDeckNav{top:8px;right:8px} .ctrl{right:10px;bottom:10px}
 #toc{padding:60px 6vw}
}
svg{max-width:100%;height:auto}
</style>
</head>

S({sec:'Day 1',kick:'Lesson',title:'What is Python, really?',html:`
${card('<h3 style="margin-top:0">An interpreted, readable language</h3><p class="small">Python is a high-level, general-purpose programming language created by Guido van Rossum and first released in 1991. High-level means it hides hardware details so you write ideas, not machine instructions. It is interpreted, so it runs your code line by line with no separate compile step, which makes experimenting fast. In security it is the default glue language: a short script can scan a network, parse a log file, automate a repetitive task, or drive a tool, often in a fraction of the lines another language would need. Its huge standard library and readable syntax are why beginners and professionals both reach for it.</p>')}`});

S({sec:'Day 1',kick:'Lesson',title:'Variables and data types',html:`
${card('<h3 style="margin-top:0">Naming and storing values</h3><p class="small">A variable is a name bound to a value stored in memory; the equals sign copies the value on the right into the name on the left. Python is dynamically typed, so a name can hold any type and you do not declare the type up front. The core types are str for text in quotes, int for whole numbers, float for decimals, and bool for True or False. Types matter for correctness and security: the string "80" is not equal to the number 80, and treating user input as the wrong type is a common source of bugs and vulnerabilities. Use the type() function to check what you have.</p>')}`});

S({sec:'Day 1',kick:'Knowledge Check',title:'Quick check',html:`

S({sec:'Day 1',kick:'Lesson',title:'Loops',html:`
${card('<h3 style="margin-top:0">Automating repetition</h3><p class="small">A loop runs the same block of code many times so a human does not have to. A for loop walks through a sequence, such as a list of hosts or characters, while a while loop repeats as long as a condition stays true. The range() function generates number sequences for counting. Loops are the heart of automation: scanning a range of ports, trying a list of inputs, or processing every line of a log are all loops. The same idea drives a CodeCombat hero through a maze: repeat a step until a goal is reached.</p>')}`});

S({sec:'Day 1',kick:'Knowledge Check',title:'Quick check',html:`

S({sec:'Day 1',kick:'Lesson',title:'Functions',html:`
${card('<h3 style="margin-top:0">Reusable building blocks</h3><p class="small">A function is a named, reusable block of code defined with def. It can take inputs called arguments and hand back a result with return. Functions let you write logic once and call it many times, which keeps programs short, readable, and easier to test. Real security tools are assembled from small functions: one to check a single port, another to format a report, called together in a loop over many targets. Breaking a problem into functions is the first step in thinking like an engineer.</p>')}`});

S({sec:'Day 1',kick:'Lesson',title:'The Linux file system',html:`
${card('<h3 style="margin-top:0">Everything branches from root</h3><p class="small">Linux organizes files in a single tree that starts at the root, written as a forward slash. Folders (directories) branch from there, and almost everything, including devices and settings, is represented as a file you can read or write. You move with cd, list with ls, see where you are with pwd, and read a file with cat. Every file carries permissions that say who may read, write, or execute it, which is a core security control. Servers are managed from this command line because it is fast, precise, and easy to script.</p>')}`});

S({sec:'Day 1',kick:'Lesson',title:'How a network message travels',html:`
${card('<h3 style="margin-top:0">Packets, addresses, and routing</h3><p class="small">When one machine sends data to another, the data is split into small chunks called packets. Each packet carries a header with the source and destination IP addresses, like an envelope with to and from lines, wrapped around a piece of the actual data. Routers read those headers and forward each packet hop by hop toward its destination, where the packets are reassembled in order. The Domain Name System (DNS) first turns a human name such as example.com into the numeric IP address the network needs. In the Cyber Range, all of this happens inside an isolated network, so nothing reaches the public internet.</p>')}

S({sec:'Day 2',kick:'Lesson',title:'The CIA triad',html:`
${card('<h3 style="margin-top:0">The three goals of all security</h3><p class="small">Security professionals judge every system against three goals. Confidentiality means only authorized people can view data, enforced with encryption, access control, and good passwords; a leaked database breaks it. Integrity means only authorized people can change data and that tampering can be detected, enforced with hashing and digital signatures; altering a bank balance breaks it. Availability means authorized people can use the data when they need it, protected with backups and redundancy; a denial-of-service flood breaks it. Every attack you study damages at least one of these pillars, and every defense protects one or more, so the triad is the lens used to reason about risk.</p>')}`});

S({sec:'Day 2',kick:'Lesson',title:'How passwords are attacked',html:`
${card('<h3 style="margin-top:0">Brute force, dictionaries, and reuse</h3><p class="small">Attackers rarely guess a password by hand. In a brute-force attack a program tries every possible combination; in a dictionary attack it tries lists of likely words and known leaked passwords first. Speed is the key danger: against stolen password hashes an attacker can test billions of guesses per second on graphics hardware, offline and undetected. Credential stuffing reuses username and password pairs from one breach against many other sites, which is why reusing passwords is so dangerous. Online guessing against a live login is slower and can be blocked by lockouts and rate limits.</p>')}`});

S({sec:'Day 2',kick:'Lesson',title:'Why length beats complexity',html:`
${card('<h3 style="margin-top:0">Keyspace and entropy</h3><p class="small">The number of possible passwords, called the keyspace, equals N to the power L, where N is how many characters are allowed and L is the length. Because L is an exponent, adding one character multiplies the total far more than swapping a letter for a symbol does. For example, an eight-character lowercase password has about 209 billion combinations, but a sixteen-character one from the same set is astronomically larger. This is why a long passphrase of several random words is both easier to remember and far stronger than a short complicated password. Entropy is the formal measure of this unpredictability, counted in bits.</p>')}`});

${kc('A salt is used to...','Salts defeat precomputed tables.')}`});

S({sec:'Day 2',kick:'Lesson',title:'Hashing',html:`
${card('<h3 style="margin-top:0">One-way fingerprints</h3><p class="small">A cryptographic hash function such as SHA-256 turns any input into a fixed-length fingerprint that cannot be reversed back into the original. Good functions are deterministic (same input, same output), fast to compute, and practically impossible to invert or to find two inputs that collide. Websites store the hash of your password, never the password itself, so that a database leak does not immediately hand attackers your secret. Hashes also verify file integrity: if even one byte changes, the fingerprint changes completely, which is the avalanche effect.</p>')}`});

S({sec:'Day 2',kick:'Lesson',title:'Salting',html:`
${card('<h3 style="margin-top:0">Defeating precomputed attacks</h3><p class="small">A salt is random data, unique to each user, added to a password before it is hashed. Without salts, two people with the same password would produce the same hash, and attackers could crack many accounts at once using precomputed tables called rainbow tables. A unique salt forces the attacker to attack each password separately and makes those giant tables useless. Modern systems also use slow, salted password-hashing functions such as bcrypt or Argon2 to make each guess expensive, slowing attackers even further.</p>')}`});

S({sec:'Day 2',kick:'Lesson',title:'Multi-factor authentication and phishing',html:`
${card('<h3 style="margin-top:0">Adding a second lock</h3><p class="small">Authentication can use something you know (a password), something you have (a phone or security key), or something you are (a fingerprint). Multi-factor authentication (MFA) requires two or more of these, so a stolen password alone is not enough to log in, which blocks the majority of account takeovers. Phishing attacks try to defeat this by tricking you into handing over both your password and your one-time code, using urgency, fear, and trust. Red flags include a look-alike sender domain, a generic greeting, spelling errors, and a link whose real destination differs from its text.</p>')}`});

S({sec:'Day 3',kick:'Lesson',title:'Encoding, encryption, and hashing',html:`
${card('<h3 style="margin-top:0">Three jobs that are easy to confuse</h3><p class="small">These three transform data but for completely different reasons. Encoding, such as Base64, reformats data into a safe character set so it survives transport; it uses no key and anyone can reverse it, so it provides no secrecy. Encryption scrambles data with a secret key so that only someone with the right key can read it; this is real confidentiality. Hashing produces a one-way fingerprint that cannot be reversed and is used to check integrity and to store passwords. Confusing them is a classic beginner mistake: Base64 looks scrambled but protects nothing, and a hash protects integrity but can never be turned back into the original.</p>')}`});

S({sec:'Day 3',kick:'Knowledge Check',title:'Quick check',html:`
${kc('Base64 is...','Base64 reformats data; no secrecy.')}`});

S({sec:'Day 3',kick:'Lesson',title:'The Caesar cipher',html:`
${card('<h3 style="margin-top:0">The first substitution cipher</h3><p class="small">Named after Julius Caesar, this cipher shifts every letter by a fixed amount, so with a shift of three the letter A becomes D. It is a substitution cipher: each letter is replaced by another according to a simple rule. Its fatal weakness is a tiny keyspace of only twenty-five useful shifts, so a computer simply tries them all in an instant, a method called brute force. Even by hand it falls to frequency analysis, because the most common ciphertext letter usually maps to the common English letter E. Modern ciphers fix this by using enormous keys that cannot be exhausted.</p>')}`});

S({sec:'Day 3',kick:'Knowledge Check',title:'Quick check',html:`
${kc('Why is the Caesar cipher weak?','Brute force breaks 25 shifts instantly.')}`});

S({sec:'Day 3',kick:'Lesson',title:'Base64 and XOR',html:`
${card('<h3 style="margin-top:0">Encoding and a cipher building block</h3><p class="small">Base64 represents binary data using sixty-four printable characters so it can travel safely through email and URLs; the trailing equals signs are padding, and it is fully reversible by anyone. XOR, the exclusive-or operation, combines data with a key one bit at a time and has a neat property: applying the same key twice returns the original. That reversibility makes XOR a building block of real stream ciphers, which generate a long, unpredictable keystream and XOR it with the message. When the key is truly random, as long as the message, and never reused, XOR becomes the unbreakable one-time pad.</p>')}`});

S({sec:'Day 3',kick:'Knowledge Check',title:'Quick check',html:`
${kc('HTTPS protects traffic using...','TLS encrypts the connection.')}`});

S({sec:'Day 3',kick:'Lesson',title:'Hashing and the avalanche effect',html:`
${card('<h3 style="margin-top:0">Sensitivity and collisions</h3><p class="small">A strong hash shows the avalanche effect: changing a single bit of the input changes about half of the output bits unpredictably, so password and Password produce completely different fingerprints. Two further properties matter: preimage resistance means you cannot work backward from a hash to an input, and collision resistance means you cannot find two different inputs with the same hash. When a hash function breaks, those guarantees fail; MD5 and SHA-1 are now retired because collisions can be produced, while SHA-256 remains the safe default. These properties are what let hashes protect downloads, passwords, and digital signatures.</p>')}`});

S({sec:'Day 3',kick:'Lesson',title:'Symmetric versus public-key encryption',html:`
${card('<h3 style="margin-top:0">Solving the key-sharing problem</h3><p class="small">Symmetric encryption, such as AES, uses one shared secret key to both encrypt and decrypt; it is fast, but both sides must somehow share the key securely first, which is hard over an open network. Public-key (asymmetric) encryption, such as RSA, solves this with a pair of keys: a public key that anyone may use to encrypt, and a private key that only the owner holds to decrypt. Its security rests on math that is easy one way and practically impossible to reverse, like multiplying two large primes versus factoring the result. In practice systems use both: public-key crypto to safely agree on a shared key, then fast symmetric crypto for the bulk data, which is exactly how HTTPS works.</p>')}`});

S({sec:'Day 3',kick:'Lesson',title:'HTTP versus HTTPS',html:`
${card('<h3 style="margin-top:0">Encrypting the web</h3><p class="small">HTTP, the HyperText Transfer Protocol, sends web requests and responses as plain text, so anyone watching the network can read or change them. HTTPS adds Transport Layer Security (TLS), which encrypts the connection and verifies the server identity with a certificate signed by a trusted authority. The TLS handshake uses public-key cryptography to agree on a fresh symmetric session key, then switches to fast symmetric encryption for the actual data. This stops eavesdropping and man-in-the-middle tampering, which is why the padlock and HTTPS are required for logins, payments, and any private data.</p>')}`});

S({sec:'Day 4',kick:'Lesson',title:'How the web talks',html:`
${card('<h3 style="margin-top:0">Requests, responses, and statelessness</h3><p class="small">The web runs on a request-response model: your browser (the client) sends an HTTP request to a server, and the server sends back a response, usually HTML. HTTP is stateless, meaning each request stands alone, so sites use cookies and tokens to remember who you are between requests. Requests use verbs such as GET to fetch and POST to send data, and a URL names the scheme, host, path, and query parameters. HTTPS wraps all of this in TLS encryption. Most web attacks target the moment when the server turns your input into an action, such as a database query.</p>')}`});

${kc('HTTPS adds what vs HTTP?','The S is Secure: TLS encryption.')}`});

S({sec:'Day 4',kick:'Lesson',title:'SQL injection',html:`
${card('<h3 style="margin-top:0">When input becomes a command</h3><p class="small">Web apps store data in databases queried with SQL. SQL injection happens when an application builds a query by gluing untrusted user input directly into the command string, so an attacker can insert their own SQL. A classic example is typing a value like quote OR 1=1 into a login field, which makes the condition always true and can bypass authentication or dump every row. The fix is parameterized queries, also called prepared statements, where the input is bound as data to a placeholder and the database never interprets it as code. Validating input adds a second layer, but parameterization is the real cure.</p>')}`});

S({sec:'Day 4',kick:'Knowledge Check',title:'Quick check',html:`
${kc('SQL injection happens when...','Never trust input; use parameterized queries.')}`});

S({sec:'Day 4',kick:'Lesson',title:'Cross-site scripting',html:`
${card('<h3 style="margin-top:0">Running attacker code in a browser</h3><p class="small">Cross-site scripting, or XSS, happens when a site takes user input and places it into a page without cleaning it, so an attacker can inject a script that runs in other visitors browsers. Stored XSS saves the malicious script on the server (for example in a comment) so it hits everyone who views the page, while reflected XSS bounces it back in a crafted link. The injected script runs with the victim trust in the site and can steal session cookies or take actions as the user. Defenses are to encode output so input is shown as text not code, validate input, and apply a Content Security Policy.</p>')}`});

S({sec:'Day 4',kick:'Knowledge Check',title:'Quick check',html:`
${kc('Prompt injection targets...','It hides instructions the model obeys.')}`});

S({sec:'Day 4',kick:'Lesson',title:'Decoding hidden data',html:`
${card('<h3 style="margin-top:0">Cookies, tokens, and encodings</h3><p class="small">Web applications constantly move small pieces of data through cookies, headers, and URL parameters, and that data is often encoded rather than encrypted. Session cookies prove you are logged in, and tokens carry claims about you; many are Base64-encoded, which looks scrambled but can be decoded by anyone. Capture The Flag web challenges lean on this by hiding flags inside cookies, comments, or encoded parameters that you recover with the same Base64 and inspection skills used in real testing. Reading these values with browser developer tools is a core beginner skill, and it shows why sensitive data must be encrypted and signed, not merely encoded.</p>')}`});

S({sec:'Day 4',kick:'Lesson',title:'Large language models',html:`
${card('<h3 style="margin-top:0">AI that follows instructions</h3><p class="small">A large language model (LLM) is an AI trained on enormous amounts of text that responds by predicting the most likely next words, one token at a time. Because it follows instructions written in plain language, it can summarize, translate, and write code, which is powerful but also means its behavior is steered entirely by the text it reads. It has no built-in notion of which instructions are trusted, so any text in its input, including a web page or document it is asked to read, can try to influence it. It can also state false things confidently, called hallucination, so important output must be verified.</p>')}`});

S({sec:'Day 4',kick:'Lesson',title:'Prompt injection',html:`
${card('<h3 style="margin-top:0">Hijacking an AI with text</h3><p class="small">Prompt injection is the top security risk for LLM applications. It works by hiding instructions inside content the model processes so that the model ignores its own rules and does what the attacker wants, such as revealing a secret or taking an unsafe action. Direct injection comes from the user message, while indirect injection hides instructions in external data the model reads, like a poisoned web page. Defenses include separating trusted instructions from untrusted data, filtering and validating inputs, limiting what the model is allowed to do, and adding output checks. No defense is perfect yet, which is why this remains an active and serious problem.</p>')}`});

<p class='muted'>Attack vs Defense</p><div style='text-align:center'><svg viewBox="0 0 740 262" style="width:100%;max-width:720px;height:auto" xmlns="http://www.w3.org/2000/svg"><text x="360" y="20" font-size="12.5" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Left: input becomes part of the command. Right: input is bound as data.</text><rect x="20" y="34" width="340" height="220" rx="14" fill="#fdecec" stroke="#dc2626" stroke-width="2"/><text x="190" y="58" font-size="14" fill="#dc2626" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">ATTACK</text><rect x="40" y="72" width="300" height="44" rx="8" fill="#fff" stroke="#64748b" stroke-width="2"/><text x="190" y="99" font-size="12" fill="#dc2626" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">input:  ' OR 1=1 --</text><line x1="190" y1="116" x2="190" y2="130" stroke="#dc2626" stroke-width="2.5"/><polygon points="184,130 190,140 196,130" fill="#dc2626"/><rect x="40" y="140" width="300" height="52" rx="8" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="190" y="162" font-size="11" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">SELECT * FROM users</text><text x="190" y="180" font-size="11" fill="#dc2626" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">WHERE name='' OR 1=1 --'</text><line x1="190" y1="192" x2="190" y2="202" stroke="#dc2626" stroke-width="2.5"/><polygon points="184,202 190,212 196,202" fill="#dc2626"/><rect x="70" y="212" width="240" height="32" rx="8" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="190" y="233" font-size="11" fill="#dc2626" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">returns EVERY row  (breach)</text><rect x="380" y="34" width="340" height="220" rx="14" fill="#e9f7ef" stroke="#16a34a" stroke-width="2"/><text x="550" y="58" font-size="13.5" fill="#16a34a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">DEFENSE: parameterized</text><rect x="400" y="72" width="300" height="44" rx="8" fill="#fff" stroke="#64748b" stroke-width="2"/><text x="550" y="99" font-size="12" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">input:  ' OR 1=1 --</text><line x1="550" y1="116" x2="550" y2="130" stroke="#16a34a" stroke-width="2.5"/><polygon points="544,130 550,140 556,130" fill="#16a34a"/><rect x="400" y="140" width="300" height="52" rx="8" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="550" y="162" font-size="11" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">SELECT * FROM users</text><text x="550" y="180" font-size="11" fill="#16a34a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">WHERE name = ?   (input is data)</text><line x1="550" y1="192" x2="550" y2="202" stroke="#16a34a" stroke-width="2.5"/><polygon points="544,202 550,212 556,202" fill="#16a34a"/><rect x="430" y="212" width="240" height="32" rx="8" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="550" y="233" font-size="11" fill="#16a34a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">no match  (safe)</text></svg></div><p class='muted' style='margin-top:10px'>Bind input as data and it cannot change the command.</p>`});

"#16a34a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Defense: validate input and encode output</text></svg></div><p class='muted' style='margin-top:10px'>Validate input and encode output to stop XSS.</p>`});

" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">DEFENSE: a guard</text><rect x="400" y="70" width="300" height="48" rx="8" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="550" y="98" font-size="11" fill="#16a34a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">filter + system rules check input</text><line x1="550" y1="118" x2="550" y2="128" stroke="#16a34a" stroke-width="2.5"/><polygon points="544,128 550,138 556,128" fill="#16a34a"/><rect x="480" y="138" width="140" height="34" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/><text x="550" y="159" font-size="11" fill="#7c3aed" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">LLM + guard</text><line x1="550" y1="172" x2="550" y2="186" stroke="#16a34a" stroke-width="2.5"/><polygon points="544,186 550,196 556,186" fill="#16a34a"/><rect x="455" y="196" width="190" height="30" rx="8" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="550" y="216" font-size="11" fill="#16a34a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">refuses to share</text></svg></div><p class='muted' style='margin-top:10px'>A guard filters input and refuses unsafe requests.</p>`});

S({sec:'Day 5',kick:'Lesson',title:'What is Capture The Flag',html:`
${card('<h3 style="margin-top:0">Learning security as a game</h3><p class="small">Capture The Flag, or CTF, is a security competition where you solve puzzles to find hidden strings called flags, written in a format such as flag{...}. Jeopardy-style events offer a board of standalone challenges across categories like cryptography, web, forensics, and reverse engineering, and are ideal for beginners. Attack-defense events have teams defend their own running services while attacking everyone else, which mirrors real operations. CTFs are safe and legal because everything happens in a controlled environment built for the game, and they are how both students and professionals sharpen real skills.</p>')}`});

S({sec:'Day 5',kick:'Knowledge Check',title:'Quick check',html:`
${kc('A picoCTF flag looks like...','Flags use the picoCTF{...} format.')}`});

S({sec:'Day 5',kick:'Lesson',title:'Red team and blue team',html:`
${card('<h3 style="margin-top:0">Attack, defend, and improve</h3><p class="small">Security exercises split into roles. The red team are authorized attackers who simulate real adversaries to find weaknesses before criminals do. The blue team are the defenders who monitor systems, detect intrusions, and respond to contain them. A purple team is the two working together so that every attack teaches the defenders something. Understanding both sides makes you better at either one, and the constant rule is permission: red teams operate only with written authorization, which is the legal and ethical line that separates a professional from a criminal.</p>')}`});

S({sec:'Day 5',kick:'Knowledge Check',title:'Quick check',html:`
${kc('Many failed logins then a success suggests...','That is a classic brute-force pattern.')}`});

S({sec:'Day 5',kick:'Lesson',title:'Reading logs',html:`
${card('<h3 style="margin-top:0">Finding the story in the events</h3><p class="small">Logs are timestamped records of what happened on a system, from logins to network connections, and they are the defender main source of evidence. An analyst looks for indicators that stand out from normal activity. A burst of many failed logins for one account followed by a success, for example, is the classic signature of a brute-force or password-guessing attack. Security teams centralize logs in a SIEM (Security Information and Event Management) tool so they can search and correlate events across many machines, turning scattered records into a clear timeline of an incident.</p>')}`});

S({sec:'Day 5',kick:'Knowledge Check',title:'Quick check',html:`

S({sec:'Day 5',kick:'Lesson',title:'Decoding flags',html:`
${card('<h3 style="margin-top:0">Putting the week together</h3><p class="small">CTF crypto and forensics challenges reward the exact skills you built this week. A flag might be Base64-encoded, shifted with a Caesar cipher, combined with XOR, or hidden in file metadata, and many combine steps so you must reverse them in order. The approach is to recognize the encoding or cipher from its shape, then apply the right tool, whether that is a quick Python snippet, CyberChef, or dcode.fr. Working multi-step flags teaches patience and pattern recognition, the same habits used in real forensic analysis.</p>')}`});

S({sec:'Day 5',kick:'Lesson',title:'Incident response',html:`
${card('<h3 style="margin-top:0">A calm plan under pressure</h3><p class="small">When something goes wrong, defenders follow a repeatable plan so they do not panic. A common model has six phases: prepare in advance, detect and analyze the event, contain it to stop the spread, eradicate the attacker foothold, recover systems to normal, and capture lessons learned afterward. Speed and clear communication matter as much as technical skill, because a fast, contained response limits the damage. Writing a blameless review afterward turns one incident into lasting improvement for the whole team.</p>')}`});

S({sec:'Day 5',kick:'Lesson',title:'Cybersecurity careers',html:`
${card('<h3 style="margin-top:0">Where these skills lead</h3><p class="small">Cybersecurity is a large field with a persistent shortage of skilled people, so the skills from this week open real doors. A SOC analyst watches for and responds to attacks, a penetration tester legally attacks systems to find weaknesses first, an incident responder cleans up after a breach, and a security engineer builds defenses into software and networks. Paths in often start with curiosity, school clubs, and competitions like picoCTF and CyberPatriot, followed later by certifications such as CompTIA Security+ and the Certified Ethical Hacker. The constant across every role is ethics: these skills are used with permission, to protect people.</p>')}`});

S({sec:'Reference',kick:'Appendix',title:'Glossary (1 of 2)',html:`

/* ============================ JAVASCRIPT SLIDESHOW ENGINE ============ */
let currentSlide = 0;

function initDeck() {
  const deck = document.getElementById('deck');
  const toclist = document.getElementById('toclist');
  let tocHTML = '';
  let lastSec = '';

  SLIDES.forEach((s, idx) => {
    // 1. Generate structural DOM node for the slide container
    const div = document.createElement('div');
    div.className = `slide ${idx === 0 ? 'active' : ''}`;
    
    // Determine inner layout template mapping rules
    let innerClass = (s.t === 'cover' || s.t === 'divider') ? 'inner center' : 'inner';
    let headerHTML = '';
    
    if (s.t !== 'cover' && s.t !== 'divider') {
      headerHTML = `
        <div class="kick">
          ${s.sec} ${s.time ? `<span class="clock">${s.time}</span>` : ''} 
          ${s.kick ? ` &middot; ${s.kick}` : ''}
        </div>
        ${s.title ? `<h2>${s.title}</h2>` : ''}
      `;
    }

    div.innerHTML = `
      <div class="${innerClass}" style="border-top: 8px solid ${ACC[s.sec] || '#334155'}">
        ${headerHTML}
        ${s.html}
      </div>
      <div class="foot">
        <div><span class="sec">${s.sec.toUpperCase()}</span> ${s.title ? `&middot; ${s.title}` : ''}</div>
        <div>${idx + 1} / ${SLIDES.length}</div>
      </div>
    `;
    deck.appendChild(div);

    // 2. Build the interactive dynamic Table of Contents entries
    if (s.sec !== lastSec) {
      tocHTML += `<div class="grp">${s.sec}</div>`;
      lastSec = s.sec;
    }
    let label = s.title || (s.t === 'cover' ? 'Course Cover Title' : 'Introduction Unit');
    tocHTML += `<a href="#" onclick="jumpTo(${idx}); return false;">${idx + 1}. ${label}</a>`;
  });

  toclist.innerHTML = tocHTML;
  updateProgress();
}

function go(dir) {
  const slides = document.querySelectorAll('.slide');
  if (slides.length === 0) return;
  
  slides[currentSlide].classList.remove('active');
  currentSlide = (currentSlide + dir + slides.length) % slides.length;
  slides[currentSlide].classList.add('active');
  updateProgress();
}

function jumpTo(idx) {
  const slides = document.querySelectorAll('.slide');
  if (idx < 0 || idx >= slides.length) return;
  
  slides[currentSlide].classList.remove('active');
  currentSlide = idx;
  slides[currentSlide].classList.add('active');
  toggleTOC(false);
  updateProgress();
}

function toggleTOC(force) {
  const toc = document.getElementById('toc');
  if (typeof force === 'boolean') {
    if (force) toc.classList.add('open');
    else toc.classList.remove('open');
  } else {
    toc.classList.toggle('open');
  }
}

function updateProgress() {
  const pbar = document.getElementById('pbar');
  if (SLIDES.length === 0) return;
  const pct = ((currentSlide + 1) / SLIDES.length) * 100;
  pbar.style.width = `${pct}%`;
}

/* Bind native browser control interactions */
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    go(1);
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    go(-1);
  }
  if (e.key.toLowerCase() === 'c') {
    toggleTOC();
  }
  if (e.key.toLowerCase() === 'f') {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  }
});

/* Trigger setup on engine completion initialization */
window.onload = initDeck;

/* --- touch swipe + scroll reset + a11y (added) --- */
(function(){
 try{
  var d=document.getElementById('deck');
  if(d){var sx=null,sy=null,isH=null;
   d.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;isH=null;},{passive:true});
   d.addEventListener('touchmove',function(e){if(sx===null)return;var dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;if(isH===null)isH=Math.abs(dx)>Math.abs(dy);if(isH)e.preventDefault();},{passive:false});
   d.addEventListener('touchend',function(e){if(sx===null)return;var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){go(dx<0?1:-1);}sx=null;isH=null;},{passive:true});}
  if(typeof go==='function'){var _g=go;go=function(n){_g(n);var a=document.querySelector('.slide.active');if(a)a.scrollTop=0;};window.go=go;}
  if(typeof jumpTo==='function'){var _j=jumpTo;jumpTo=function(i){_j(i);var a=document.querySelector('.slide.active');if(a)a.scrollTop=0;};window.jumpTo=jumpTo;}
 }catch(e){}
})();
</script>
